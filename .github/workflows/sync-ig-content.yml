name: IG Content Tracker

on:
  schedule:
    # Every Monday at 03:00 UTC (11:00 Singapore time)
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run IG Content Sync
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
        run: python ig_content_sync.py
