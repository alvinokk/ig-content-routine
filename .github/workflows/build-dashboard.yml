name: Build Dashboard

on:
  # rebuild as soon as either tracker finishes (the later one bakes full data)
  workflow_run:
    workflows: ["IG Content Tracker", "AI Content Tracker"]
    types: [completed]
  schedule:
    # Monday 08:00 UTC (16:00 SGT) — late fallback in case triggers missed
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # skip rebuilds triggered by a failed sync
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate dashboard
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
        run: python generate_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Update dashboard [skip ci]"
            git push
          fi
